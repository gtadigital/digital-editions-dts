events {}

http {
    server {
        listen 80;

        location /whoami {
            proxy_pass http://whoami:80;
        }

    location ^~ /dts {
      client_max_body_size 50M;
      proxy_pass http://dapytains:5000/;
      proxy_set_header Host $http_host;
      proxy_set_header X-REAL-IP $remote_addr;
    }
    }
}
